<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://unpkg.com https://cdn.tailwindcss.com https://fonts.googleapis.com https://quote-api.jup.ag https://api.jup.ag; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.tailwindcss.com; connect-src 'self' https://quote-api.jup.ag https://api.jup.ag; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
    <title>Liquid.Swap | Solana Token Exchange</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@solana/wallet-adapter-adapter@0.9.25/lib/index.iife.js"></script>
    <script src="https://unpkg.com/@solana/wallet-adapter-react@0.15.35/lib/index.iife.js"></script>
    <script src="https://unpkg.com/@jup-ag/core@0.4.0/lib/index.iife.js"></script>
    <script src="https://unpkg.com/@solana/web3.js@1.91.8/lib/index.iife.js"></script>
    <style>
        :root {
            --gold: #c9a227;
            --gold-light: #e8d48a;
            --black: #0a0a0a;
            --cream: #f5f0e6;
            --gray: #1a1a1a;
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--black);
            color: var(--cream);
        }
        .font-display { font-family: 'Cormorant Garamond', serif; }
        .gold-gradient {
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .swap-card {
            background: linear-gradient(145deg, #151515 0%, #0d0d0d 100%);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(201, 162, 39, 0.1);
        }
        .token-input {
            transition: all 0.2s ease;
        }
        .token-input:focus-within {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.1);
        }
        .swap-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .swap-btn:hover {
            transform: rotate(180deg);
            box-shadow: 0 0 20px rgba(201, 162, 39, 0.4);
        }
        .execute-btn {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .execute-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .execute-btn:hover::before {
            left: 100%;
        }
        .execute-btn:disabled::before {
            display: none;
        }
        .fade-in {
            animation: fadeIn 0.3s ease-out;
        }
        /* Hide number input spinners */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen">
    <!-- Header -->
    <header class="border-b border-yellow-900/30">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="font-display text-3xl tracking-widest gold-gradient">LIQUID.SWAP</div>
            <div class="flex items-center gap-4">
                <button class="text-xs tracking-widest uppercase text-yellow-500/70 hover:text-yellow-400">Tokens</button>
                <button class="text-xs tracking-widest uppercase text-yellow-500/70 hover:text-yellow-400">Pool</button>
                <div id="walletContainer"></div>
            </div>
        </div>
    </header>

    <!-- Main Swap Interface -->
    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="max-w-lg mx-auto">
            <div class="text-center mb-8">
                <h1 class="font-display text-5xl mb-2">Swap</h1>
                <p class="text-yellow-500/50 text-sm">Trade SPL tokens instantly on Solana</p>
            </div>

            <!-- Swap Card -->
            <div class="swap-card rounded-xl p-6">
                <!-- From Token -->
                <div class="mb-2">
                    <div class="flex justify-between text-xs text-yellow-500/50 mb-2">
                        <span>You Pay</span>
                        <span>Balance: <span id="fromBalance">--</span></span>
                    </div>
                    <div class="flex items-center gap-3 bg-[#0a0a0a] border border-yellow-900/30 rounded-lg p-4">
                        <button id="fromTokenBtn" class="flex items-center gap-2 min-w-[100px]">
                            <div id="fromTokenIcon" class="w-8 h-8 rounded-full bg-yellow-500/20 flex items-center justify-center text-yellow-500 font-bold">S</div>
                            <span class="font-medium" id="fromToken">SOL</span>
                            <svg class="w-4 h-4 text-yellow-500/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                        <input type="number" id="fromAmount" placeholder="0.00" class="flex-1 bg-transparent text-right text-2xl font-medium outline-none placeholder-yellow-500/30 w-full">
                    </div>
                </div>

                <!-- Swap Button -->
                <div class="flex justify-center items-center -my-6 relative z-10">
                    <button id="swapBtn" class="w-10 h-10 rounded-full bg-gradient-to-br from-yellow-500 to-yellow-600 text-black flex items-center justify-center hover:from-yellow-400 hover:to-yellow-500 transition-all shadow-[0_0_15px_rgba(201,162,39,0.3)] border-2 border-yellow-400/30">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/></svg>
                    </button>
                </div>

                <!-- To Token -->
                <div class="mb-4">
                    <div class="flex justify-between text-xs text-yellow-500/50 mb-2">
                        <span>You Receive</span>
                        <span>Balance: <span id="toBalance">--</span></span>
                    </div>
                    <div class="flex items-center gap-3 bg-[#0a0a0a] border border-yellow-900/30 rounded-lg p-4">
                        <button id="toTokenBtn" class="flex items-center gap-2 min-w-[100px]">
                            <div id="toTokenIcon" class="w-8 h-8 rounded-full bg-yellow-500/20 flex items-center justify-center text-yellow-500 font-bold">U</div>
                            <span class="font-medium" id="toToken">USDC</span>
                            <svg class="w-4 h-4 text-yellow-500/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                        </button>
                        <input type="number" id="toAmount" placeholder="0.00" class="flex-1 bg-transparent text-right text-2xl font-medium outline-none placeholder-yellow-500/30 w-full" readonly>
                    </div>
                </div>

                <!-- Exchange Rate -->
                <div class="border-t border-yellow-900/30 pt-4 mt-4">
                    <div class="flex justify-between text-xs text-yellow-500/70">
                        <span>Rate</span>
                        <span id="exchangeRate">--</span>
                    </div>
                    <div class="flex justify-between text-xs text-yellow-500/70 mt-2">
                        <span>Price Impact</span>
                        <span id="priceImpact" class="text-green-500">--</span>
                    </div>
                    <div class="flex justify-between text-xs text-yellow-500/70 mt-2">
                        <span>Slippage</span>
                        <div class="flex items-center gap-2">
                            <button class="slippage-btn px-2 py-0.5 border border-yellow-500/30 rounded text-yellow-500/70 hover:border-yellow-500" data-value="0.5">0.5%</button>
                            <button class="slippage-btn px-2 py-0.5 border border-yellow-500 rounded text-yellow-500" data-value="1">1%</button>
                            <button class="slippage-btn px-2 py-0.5 border border-yellow-500/30 rounded text-yellow-500/70 hover:border-yellow-500" data-value="3">3%</button>
                        </div>
                    </div>
                </div>

                <!-- Execute Swap -->
                <button id="executeSwap" class="w-full mt-6 py-4 bg-yellow-500 text-black font-medium tracking-widest uppercase hover:bg-yellow-400 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Connect Wallet to Swap
                </button>
            </div>

            <!-- Loading/Status -->
            <div id="swapStatus" class="text-center mt-4 text-sm text-yellow-500/70 hidden"></div>
        </div>
    </main>

    <!-- Token Modal -->
    <div id="tokenModal" class="fixed inset-0 bg-black/90 z-50 hidden">
        <div class="max-w-md mx-auto mt-20 bg-[#111] border border-yellow-900/30 rounded-lg">
            <div class="p-4 border-b border-yellow-900/30 flex justify-between items-center">
                <h3 class="font-display text-xl">Select Token</h3>
                <button id="closeModal" class="text-yellow-500/50 hover:text-yellow-500">✕</button>
            </div>
            <div class="p-4">
                <input type="text" id="tokenSearch" placeholder="Search tokens..." class="w-full bg-[#0a0a0a] border border-yellow-900/30 rounded-lg px-4 py-3 text-sm outline-none focus:border-yellow-500">
            </div>
            <div id="tokenList" class="max-h-80 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        // Jupiter API integration
        const JUPITER_API = 'https://quote-api.jup.ag/v6';
        
        // Token data with mint addresses
        const TOKENS = [
            { symbol: 'SOL', name: 'Solana', mint: 'So11111111111111111111111111111111111111112', decimals: 9, logo: 'S' },
            { symbol: 'USDC', name: 'USD Coin', mint: 'EPjFWdd5AufqSSVqM46uMfchR9gN8QqMKSdefch', decimals: 6, logo: 'U' },
            { symbol: 'USDT', name: 'Tether', mint: 'Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB', decimals: 6, logo: 'T' },
            { symbol: 'BONK', name: 'Bonk', mint: 'DezXAZ8z7PnrnRJjz3wXBoUcixk6Qvh3NG4tkgCCuXP3', decimals: 5, logo: 'B' },
            { symbol: 'WIF', name: 'dogwifhat', mint: '85VBFQZC9TZkfaptBWqv14ALD9fJNUKtWA41kh69teRP', decimals: 6, logo: 'W' },
            { symbol: 'JUP', name: 'Jupiter', mint: 'JUPyiwrYJFskUPiHa7hkeR8VUtkqjberbSOWd91pbT2', decimals: 6, logo: 'J' },
            { symbol: 'RAY', name: 'Raydium', mint: '4k3DyjzvzpLh6BbJ9WW4qff2u1SXYh3xRnKk5w5NbS7', decimals: 6, logo: 'R' },
            { symbol: 'ORCA', name: 'Orca', mint: 'orcarKHSqFvM3LHKhC5v7y3BPcZvVJvXZ8FjW1h8q4v', decimals: 6, logo: 'O' },
            { symbol: 'mSOL', name: 'Marinade staked SOL', mint: 'mSoLzYCxHdYgdzU18gNJmJ8kCqgt4vqEEVTwTFx4by', decimals: 9, logo: 'M' },
            { symbol: 'stSOL', name: 'Lido Staked SOL', mint: '7dHbWXmci3dT8vYWomM94gNqG5vCXTfU6J16VV1KCFW', decimals: 9, logo: 'L' },
        ];

        let fromToken = TOKENS[0];
        let toToken = TOKENS[1];
        let slippage = 1;
        let wallet = null;
        let connection = null;
        let quote = null;

        // DOM Elements
        const fromTokenBtn = document.getElementById('fromTokenBtn');
        const toTokenBtn = document.getElementById('toTokenBtn');
        const tokenModal = document.getElementById('tokenModal');
        const tokenList = document.getElementById('tokenList');
        const fromAmount = document.getElementById('fromAmount');
        const toAmount = document.getElementById('toAmount');
        const swapBtn = document.getElementById('swapBtn');
        const executeSwap = document.getElementById('executeSwap');
        const swapStatus = document.getElementById('swapStatus');

        // Initialize Wallet
        const PHANTOM_DEEPLINK = 'https://phantom.app/ul/browse/';
        
        async function initWallet() {
            // Check for Phantom
            if (window.solana?.isPhantom) {
                wallet = window.solana;
                wallet.on('connect', (publicKey) => {
                    console.log('Phantom connected:', publicKey.toString());
                    document.getElementById('executeSwap').disabled = false;
                    document.getElementById('executeSwap').textContent = 'Swap';
                    updateBalances();
                    updateWalletUI(wallet.publicKey.toString().slice(0, 4) + '...' + wallet.publicKey.toString().slice(-4));
                });
                wallet.on('disconnect', () => {
                    document.getElementById('executeSwap').disabled = true;
                    document.getElementById('executeSwap').textContent = 'Connect Wallet to Swap';
                    updateWalletUI(null);
                });
            }
        }
        
        function updateWalletUI(address) {
            const container = document.getElementById('walletContainer');
            if (address) {
                container.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="px-3 py-1 bg-purple-600 text-white text-xs rounded">${address}</div>
                        <button onclick="disconnectWallet()" class="text-yellow-500/50 hover:text-yellow-400 text-xs">Disconnect</button>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <button onclick="connectWallet()" class="px-6 py-2 border border-yellow-500 text-yellow-500 text-xs tracking-widest uppercase hover:bg-yellow-500 hover:text-black transition">
                        Connect Wallet
                    </button>
                `;
            }
        }

        // Connect wallet
        async function connectWallet() {
            if (window.solana?.isPhantom) {
                try {
                    await window.solana.connect({ onlyIfTrusted: false });
                } catch (e) {
                    console.error('Wallet connection failed:', e);
                    // Open Phantom app
                    window.open(PHANTOM_DEEELINK, '_blank');
                }
            } else {
                // Redirect to Phantom download
                window.open('https://phantom.app/download', '_blank');
            }
        }
        
        async function disconnectWallet() {
            if (window.solana?.isPhantom) {
                await window.solana.disconnect();
            }
        }

        // Get quote from Jupiter
        async function getQuote() {
            if (!fromAmount.value || parseFloat(fromAmount.value) <= 0) return;
            
            try {
                const amount = Math.floor(parseFloat(fromAmount.value) * Math.pow(10, fromToken.decimals));
                const response = await fetch(
                    `${JUPITER_API}/quote?inputMint=${fromToken.mint}&outputMint=${toToken.mint}&amount=${amount}&slippage=${slippage}`
                );
                
                if (!response.ok) throw new Error('Quote failed');
                
                quote = await response.json();
                
                const outAmount = quote.outAmount / Math.pow(10, toToken.decimals);
                toAmount.value = outAmount.toFixed(toToken.decimals);
                
                // Update rate display
                const rate = outAmount / parseFloat(fromAmount.value);
                document.getElementById('exchangeRate').textContent = `1 ${fromToken.symbol} = ${rate.toFixed(4)} ${toToken.symbol}`;
                
                // Price impact
                document.getElementById('priceImpact').textContent = (quote.priceImpactPct || 0) + '%';
                
            } catch (e) {
                console.error('Quote error:', e);
                swapStatus.textContent = 'Failed to get quote';
                swapStatus.classList.remove('hidden');
            }
        }

        // Execute swap
        async function executeSwapTx() {
            if (!wallet || !quote) return;
            
            try {
                swapStatus.textContent = 'Preparing transaction...';
                swapStatus.classList.remove('hidden');
                
                // Get swap transactions
                const response = await fetch(`${JUPITER_API}/swap`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        quoteResponse: quote,
                        userPublicKey: wallet.publicKey?.toString() || window.phantom?.solana?.publicKey?.toString(),
                        wrapUnwrapSOL: true
                    })
                });
                
                const { swapTransaction } = await response.json();
                
                // Deserialize and sign
                const swapTx = window.solanaWeb3.VersionedTransaction.deserialize(
                    Uint8Array.from(atob(swapTransaction), c => c.charCodeAt(0))
                );
                
                // Sign (this would normally use wallet)
                // For demo, show success
                swapStatus.textContent = 'Transaction prepared! (Demo mode)';
                
            } catch (e) {
                console.error('Swap error:', e);
                swapStatus.textContent = 'Swap failed: ' + e.message;
            }
        }

        // Update token balances
        async function updateBalances() {
            // Would fetch from Solana - placeholder for demo
            document.getElementById('fromBalance').textContent = '12.45';
            document.getElementById('toBalance').textContent = '1,234.56';
        }

        // Render token list
        function renderTokenList(filter = '') {
            const filtered = TOKENS.filter(t => 
                t.symbol.toLowerCase().includes(filter.toLowerCase()) ||
                t.name.toLowerCase().includes(filter.toLowerCase())
            );
            tokenList.innerHTML = filtered.map(token => `
                <div class="token-option flex items-center gap-3 p-3 hover:bg-yellow-500/10 cursor-pointer" data-symbol="${token.symbol}">
                    <div class="w-10 h-10 rounded-full bg-yellow-500/20 flex items-center justify-center text-yellow-500 font-bold">${token.logo}</div>
                    <div>
                        <div class="font-medium">${token.symbol}</div>
                        <div class="text-xs text-yellow-500/50">${token.name}</div>
                    </div>
                </div>
            `).join('');
        }

        // Token selection
        let selectingFrom = true;
        fromTokenBtn.addEventListener('click', () => { selectingFrom = true; renderTokenList(); tokenModal.classList.remove('hidden'); });
        toTokenBtn.addEventListener('click', () => { selectingFrom = false; renderTokenList(); tokenModal.classList.remove('hidden'); });
        document.getElementById('closeModal').addEventListener('click', () => tokenModal.classList.add('hidden'));
        tokenModal.addEventListener('click', (e) => { if (e.target === tokenModal) tokenModal.classList.add('hidden'); });

        tokenList.addEventListener('click', (e) => {
            const option = e.target.closest('.token-option');
            if (option) {
                const symbol = option.dataset.symbol;
                const token = TOKENS.find(t => t.symbol === symbol);
                if (selectingFrom) {
                    fromToken = token;
                    document.getElementById('fromToken').textContent = token.symbol;
                    document.getElementById('fromTokenIcon').textContent = token.logo;
                } else {
                    toToken = token;
                    document.getElementById('toToken').textContent = token.symbol;
                    document.getElementById('toTokenIcon').textContent = token.logo;
                }
                tokenModal.classList.add('hidden');
                getQuote();
            }
        });

        document.getElementById('tokenSearch').addEventListener('input', (e) => renderTokenList(e.target.value));

        // Swap tokens
        swapBtn.addEventListener('click', () => {
            const temp = fromToken;
            fromToken = toToken;
            toToken = temp;
            document.getElementById('fromToken').textContent = fromToken.symbol;
            document.getElementById('toToken').textContent = toToken.symbol;
            document.getElementById('fromTokenIcon').textContent = fromToken.logo;
            document.getElementById('toTokenIcon').textContent = toToken.logo;
            getQuote();
        });

        // Slippage
        document.querySelectorAll('.slippage-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.slippage-btn').forEach(b => { 
                    b.classList.remove('border-yellow-500', 'text-yellow-500'); 
                    b.classList.add('border-yellow-500/30', 'text-yellow-500/70'); 
                });
                btn.classList.add('border-yellow-500', 'text-yellow-500');
                btn.classList.remove('border-yellow-500/30', 'text-yellow-500/70');
                slippage = parseFloat(btn.dataset.value);
                getQuote();
            });
        });

        // Quote on amount change
        fromAmount.addEventListener('input', getQuote);

        // Execute swap
        executeSwap.addEventListener('click', executeSwapTx);

        // Initialize
        renderTokenList();
        initWallet();
    </script>
</body>
</html>
