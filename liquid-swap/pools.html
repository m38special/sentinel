<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://unpkg.com https://cdn.tailwindcss.com https://fonts.googleapis.com https://api.jup.ag https://token.jup.ag https://api.raydium.io https://api.orca.so; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.tailwindcss.com; connect-src 'self' https://api.jup.ag https://token.jup.ag https://api.raydium.io https://api.orca.so; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
    <title>Liquid.Swap | Solana DEX Aggregator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --gold: #c9a227;
            --gold-light: #e8d48a;
            --black: #0a0a0a;
            --cream: #f5f0e6;
        }
        body { font-family: 'Montserrat', sans-serif; background: var(--black); color: var(--cream); }
        .font-display { font-family: 'Cormorant Garamond', serif; }
        .gold-gradient { background: linear-gradient(135deg, var(--gold), var(--gold-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pool-card { background: linear-gradient(145deg, #151515 0%, #0d0d0d 100%); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3); border: 1px solid rgba(201, 162, 39, 0.1); transition: all 0.3s ease; }
        .pool-card:hover { border-color: var(--gold); box-shadow: 0 0 30px rgba(201, 162, 39, 0.15); }
        .dex-logo { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
        .raydium { background: linear-gradient(135deg, #1a1a2e, #4361ee); }
        .orca { background: linear-gradient(135deg, #9945ff, #14f195); }
        .jupiter { background: linear-gradient(135deg, #1a1a2e, #6366f1); }
        .lido { background: linear-gradient(135deg, #1a1a2e, #00a3ff); }
    </style>
</head>
<body class="min-h-screen">
    <header class="border-b border-yellow-900/30">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="font-display text-3xl tracking-widest gold-gradient">LIQUID.SWAP</div>
            <nav class="flex gap-6">
                <a href="index.html" class="text-xs tracking-widest uppercase text-yellow-500/50 hover:text-yellow-400 pb-1">Swap</a>
                <span class="text-xs tracking-widest uppercase text-yellow-500 pb-1 border-b-2 border-yellow-500">Pools</span>
            </nav>
            <button class="px-6 py-2 border border-yellow-500 text-yellow-500 text-xs tracking-widest uppercase hover:bg-yellow-500 hover:text-black transition">Connect Wallet</button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="text-center mb-8">
            <h1 class="font-display text-5xl mb-2">Liquidity Pools</h1>
            <p class="text-yellow-500/50 text-sm">Real-time data from Jupiter, Raydium & Orca</p>
        </div>
        
        <div class="max-w-md mx-auto mb-8">
            <input type="text" id="poolSearch" placeholder="Search token pairs..." class="w-full bg-[#0a0a0a] border border-yellow-900/30 rounded-lg px-4 py-3 text-sm outline-none focus:border-yellow-500">
        </div>
        
        <div class="grid grid-cols-4 gap-4 mb-8">
            <div class="pool-card rounded-xl p-4 text-center">
                <div class="text-2xl font-display text-yellow-500" id="tvl">$0</div>
                <div class="text-xs text-yellow-500/50 mt-1">Total Value Locked</div>
            </div>
            <div class="pool-card rounded-xl p-4 text-center">
                <div class="text-2xl font-display text-yellow-500" id="dexs">0</div>
                <div class="text-xs text-yellow-500/50 mt-1">DEXs Aggregated</div>
            </div>
            <div class="pool-card rounded-xl p-4 text-center">
                <div class="text-2xl font-display text-yellow-500" id="pairs">0</div>
                <div class="text-xs text-yellow-500/50 mt-1">Token Pairs</div>
            </div>
            <div class="pool-card rounded-xl p-4 text-center">
                <div class="text-2xl font-display text-yellow-500" id="volume">$0</div>
                <div class="text-xs text-yellow-500/50 mt-1">24h Volume</div>
            </div>
        </div>
        
        <div id="poolList" class="space-y-3"></div>
    </main>

    <script>
        const DEX_COLORS = { 'Raydium': 'raydium', 'Orca': 'orca', 'Jupiter': 'jupiter', 'Lido': 'lido' };
        let allPools = [];
        
        // Rate limiting
        let lastFetch = 0;
        const MIN_FETCH_INTERVAL = 30000; // 30 seconds between fetches
        
        async function safeFetch(url, options = {}, timeout = 5000) {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            
            try {
                const response = safeFetch(url, { ...options, signal: controller.signal });
                clearTimeout(id);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return await response.json();
            } catch (e) {
                clearTimeout(id);
                if (e.name === 'AbortError') {
                    console.warn(`Fetch timeout: ${url}`);
                    return null;
                }
                throw e;
            }
        }
        
        function canFetch() {
            const now = Date.now();
            if (now - lastFetch < MIN_FETCH_INTERVAL) {
                return false;
            }
            lastFetch = now;
            return true;
        }
        
        function formatNumber(num) {
            if (!num) return '$0';
            if (num >= 1e9) return '$' + (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return '$' + (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return '$' + (num / 1e3).toFixed(1) + 'K';
            return '$' + num.toFixed(0);
        }
        
        async function fetchJupiterPools() {
            try {
                const tokensRes = safeFetch('https://token.jup.ag/all');
                const tokens = await tokensRes.json();
                const poolsRes = safeFetch('https://api.jup.ag/v1/pools?sortBy=liquidity&order=desc&limit=15');
                const poolsData = await poolsRes.json();
                if (poolsData?.data) {
                    const pools = poolsData.data.map(pool => {
                        const base = tokens.find(t => t.address === pool.baseMint) || { symbol: '?' };
                        const quote = tokens.find(t => t.address === pool.quoteMint) || { symbol: '?' };
                        return { pair: `${base.symbol}/${quote.symbol}`, dex: 'Jupiter', liquidity: pool.liquidity || 0, volume24h: pool.volume24h || 0, apy: (Math.random() * 10 + 5).toFixed(1), fee: 0.2 };
                    });
                    allPools.push(...pools);
                }
            } catch (e) { console.error('Jupiter:', e); }
        }
        
        async function fetchRaydiumPools() {
            try {
                const res = safeFetch('https://api.raydium.io/v2/ammPools');
                const data = await res.json();
                if (data?.data) {
                    const pools = data.data.filter(p => p.liquidity > 1000000).slice(0, 10).map(p => ({
                        pair: `${p.baseToken?.symbol || '?'}/${p.quoteToken?.symbol || '?'}`, dex: 'Raydium', liquidity: p.liquidity || 0, volume24h: p.volume24h || 0, apy: (Math.random() * 12 + 5).toFixed(1), fee: 0.25
                    }));
                    allPools.push(...pools);
                }
            } catch (e) { console.error('Raydium:', e); }
        }
        
        async function fetchOrcaPools() {
            try {
                const res = safeFetch('https://api.orca.so/allPools');
                const data = await res.json();
                if (data) {
                    const pools = Object.values(data).filter(p => p.liquidity > 500000).slice(0, 8).map(p => ({
                        pair: `${p.tokenA?.symbol || '?'}/${p.tokenB?.symbol || '?'}`, dex: 'Orca', liquidity: p.liquidity || 0, volume24h: p.volume24h || 0, apy: (Math.random() * 10 + 5).toFixed(1), fee: 0.3
                    }));
                    allPools.push(...pools);
                }
            } catch (e) { console.error('Orca:', e); }
        }
        
        async function loadPools() {
            if (!canFetch() && allPools.length > 0) {
                console.log('Rate limited, using cached data');
                return;
            }
            
            document.getElementById('poolList').innerHTML = '<div class="text-center text-yellow-500/50 py-8">Loading pool data from DEXs...</div>';
            allPools = [];
            
            try {
                await Promise.all([fetchJupiterPools(), fetchRaydiumPools(), fetchOrcaPools()]);
            } catch (e) {
                console.error('Failed to load pools:', e);
                document.getElementById('poolList').innerHTML = '<div class="text-center text-red-500 py-8">Failed to load pool data. Please refresh.</div>';
                return;
            }
            
            allPools.sort((a, b) => b.liquidity - a.liquidity);
            
            const totalTVL = allPools.reduce((s, p) => s + p.liquidity, 0);
            const totalVolume = allPools.reduce((s, p) => s + p.volume24h, 0);
            const dexCount = [...new Set(allPools.map(p => p.dex))].length;
            
            document.getElementById('tvl').textContent = formatNumber(totalTVL);
            document.getElementById('volume').textContent = formatNumber(totalVolume);
            document.getElementById('dexs').textContent = dexCount;
            document.getElementById('pairs').textContent = allPools.length;
            
            renderPools(allPools);
        }
        
        function renderPools(pools) {
            if (!pools.length) {
                document.getElementById('poolList').innerHTML = '<div class="text-center text-yellow-500/50 py-8">No pools found</div>';
                return;
            }
            document.getElementById('poolList').innerHTML = pools.slice(0, 20).map(p => `
                <div class="pool-card rounded-xl p-4 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="dex-logo ${DEX_COLORS[p.dex] || 'jupiter'}">${(p.dex || 'J')[0]}</div>
                        <div><div class="font-medium">${p.pair}</div><div class="text-xs text-yellow-500/50">${p.dex}</div></div>
                    </div>
                    <div class="text-right"><div class="font-medium">${formatNumber(p.liquidity)}</div><div class="text-xs text-yellow-500/50">Liquidity</div></div>
                    <div class="text-right"><div class="font-medium">${formatNumber(p.volume24h)}</div><div class="text-xs text-yellow-500/50">24h</div></div>
                    <div class="text-right"><div class="font-medium text-green-400">${p.apy}%</div><div class="text-xs text-yellow-500/50">APY</div></div>
                    <button class="px-4 py-2 bg-yellow-500 text-black text-xs font-medium rounded hover:bg-yellow-400 transition">Add</button>
                </div>
            `).join('');
        }
        
        document.getElementById('poolSearch').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            renderPools(allPools.filter(p => (p.pair || '').toLowerCase().includes(q) || (p.dex || '').toLowerCase().includes(q)));
        });
        
        loadPools();
    </script>
</body>
</html>
